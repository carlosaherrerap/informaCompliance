services:
  - type: web
    name: informaperu-backend
    env: docker
    dockerContext: ./api
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: informaperu-redis
          property: connectionString

  - type: redis
    name: informaperu-redis
    plan: free
    region: ohio
    ipAllowList: []

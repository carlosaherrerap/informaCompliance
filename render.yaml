services:
  - type: web
    name: informaperu-backend
    env: docker
    dockerContext: .
    dockerfilePath: api/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: informaperu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: informaperu-redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: informaperu-frontend
          property: host
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_CALLBACK_URL
        value: https://informaperu-backend.onrender.com/auth/google/callback

  - type: redis
    name: informaperu-redis
    plan: free
    region: ohio
    ipAllowList: []

  - type: web
    name: informaperu-frontend
    env: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: VITE_API_URL
        value: https://informaperu-backend.onrender.com

databases:
  - name: informaperu-db
    plan: free
    region: ohio
